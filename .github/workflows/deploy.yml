name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Firebase web config is public client configuration. Vite must receive
          # it at build time because .env.local is intentionally gitignored.
          VITE_FIREBASE_API_KEY: AIzaSyDvD1cjz3IzQmfx-ay7foZlsLe5AoS1UIA
          VITE_FIREBASE_AUTH_DOMAIN: pisti-rush.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: pisti-rush
          VITE_FIREBASE_STORAGE_BUCKET: pisti-rush.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "498335289549"
          VITE_FIREBASE_APP_ID: "1:498335289549:web:a064fbf000dbb464e9d984"
          VITE_FIREBASE_MEASUREMENT_ID: G-RCLTHKQ96D

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
